name: Release EchoWork

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout EchoWork (private repo)
        uses: actions/checkout@v4
        with:
          repository: EchoWorker/EchoWork
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install npm deps
        run: npm ci

      - name: Override version
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${{ inputs.version }}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const p = 'package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          python3 -c "
          import re
          p = 'src-tauri/Cargo.toml'
          src = open(p).read()
          new = re.sub(
              r'(\[package\][^\[]*?version\s*=\s*\")[^\"]+(\")',
              r'\g<1>$VERSION\g<2>',
              src,
              count=1,
              flags=re.DOTALL,
          )
          open(p, 'w').write(new)
          "
          echo '--- updated versions ---'
          grep '"version"' src-tauri/tauri.conf.json | head -1
          grep '"version"' package.json | head -1
          grep -E '^version' src-tauri/Cargo.toml | head -1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Collect bundled artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe       dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip  dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig       dist-artifacts/ 2>/dev/null || true
          else
            cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg              dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz     dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig dist-artifacts/ 2>/dev/null || true
          fi
          ls -la dist-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echowork-${{ matrix.platform }}
          path: dist-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inspect downloaded artifacts
        run: |
          echo "=== artifacts tree ==="
          find artifacts -type f | sort
          echo "=== sizes ==="
          du -ah artifacts | sort -k2

      - name: Generate latest.json
        id: manifest
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${{ inputs.version }}"
          TAG="echowork-v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/EchoWorker/EchoAIStore/releases/download/${TAG}"

          find_one() {
            local pattern="$1"
            local label="$2"
            local found
            found=$(find artifacts -type f -name "$pattern" | head -n1)
            if [ -z "$found" ]; then
              echo "ERROR: missing $label artifact (pattern: $pattern)" >&2
              find artifacts -type f >&2
              exit 1
            fi
            echo "$found"
          }

          WIN_BUNDLE=$(find_one '*-setup.exe' 'Windows updater bundle')
          WIN_SIG_FILE=$(find_one '*-setup.exe.sig' 'Windows updater signature')
          WIN_NAME=$(basename "$WIN_BUNDLE")
          WIN_SIG=$(cat "$WIN_SIG_FILE")

          MAC_ARM_TAR=$(find_one '*.app.tar.gz' 'macOS ARM updater bundle')
          MAC_ARM_SIG_FILE=$(find_one '*.app.tar.gz.sig' 'macOS ARM updater signature')
          MAC_ARM_NAME=$(basename "$MAC_ARM_TAR")
          MAC_ARM_SIG=$(cat "$MAC_ARM_SIG_FILE")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "EchoWork v${VERSION}" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "${BASE_URL}/${WIN_NAME}" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_arm_url "${BASE_URL}/${MAC_ARM_NAME}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.exe' -o -name '*.nsis.zip' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) -exec cp {} release-files/ \;
          cp latest.json release-files/
          ls -la release-files/

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: EchoWork v${{ steps.manifest.outputs.version }}
          body: |
            ## EchoWork v${{ steps.manifest.outputs.version }}

            See [EchoWork install guide](https://github.com/EchoWorker/EchoAIStore/tree/main/EchoWork) for details.

            **Note**: EchoWork requires [EchoAI](https://github.com/EchoWorker/EchoAIStore/tree/main/EchoAI) backend.
          files: release-files/*

      - name: Update echowork-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete echowork-latest --yes 2>/dev/null || true
          gh release create echowork-latest \
            --title "EchoWork Latest (v${{ steps.manifest.outputs.version }})" \
            --notes "Always points to the latest EchoWork build. Used by in-app auto-updater." \
            release-files/*
