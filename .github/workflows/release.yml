name: Release All

on:
  workflow_dispatch:
    inputs:
      echoai_version:
        description: 'EchoAI version (e.g. 0.3.0, leave empty to skip)'
        required: false
        type: string
      echowork_version:
        description: 'EchoWork version (e.g. 0.2.1, leave empty to skip)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # EchoAI Build (3 platforms)
  # ─────────────────────────────────────────────
  build-echoai:
    if: inputs.echoai_version != ''
    name: EchoAI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: echoai-windows-x64.zip
            binary: echoai.exe
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: echoai-linux-x64.tar.gz
            binary: echoai
          - os: macos-14
            target: aarch64-apple-darwin
            archive: echoai-darwin-arm64.tar.gz
            binary: echoai

    steps:
      - uses: actions/checkout@v4
        with:
          repository: EchoWorker/EchoAI
          path: EchoAI
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: EchoWorker/EchoCodeRust
          path: EchoCodeRust
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: EchoWorker/EchoMemoryRust
          path: EchoMemoryRust
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            EchoAI/target
          key: echoai-${{ matrix.target }}-${{ hashFiles('EchoAI/Cargo.lock') }}
          restore-keys: echoai-${{ matrix.target }}-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build release
        working-directory: EchoAI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        working-directory: EchoAI
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: EchoAI
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: EchoAI/${{ matrix.archive }}

  # ─────────────────────────────────────────────
  # EchoWork Build (2 platforms)
  # ─────────────────────────────────────────────
  build-echowork:
    if: inputs.echowork_version != ''
    name: EchoWork (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout EchoWork
        uses: actions/checkout@v4
        with:
          repository: EchoWorker/EchoWork
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: echowork-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: echowork-${{ matrix.target }}-

      - run: npm ci

      - name: Override version
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${{ inputs.echowork_version }}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const p = 'package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          python3 -c "
          import re
          p = 'src-tauri/Cargo.toml'
          src = open(p).read()
          new = re.sub(
              r'(\[package\][^\[]*?version\s*=\s*\")[^\"]+(\")',
              r'\g<1>$VERSION\g<2>',
              src,
              count=1,
              flags=re.DOTALL,
          )
          open(p, 'w').write(new)
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe       dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip  dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig       dist-artifacts/ 2>/dev/null || true
          else
            cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg              dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz     dist-artifacts/ 2>/dev/null || true
            cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig dist-artifacts/ 2>/dev/null || true
          fi
          ls -la dist-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: echowork-${{ matrix.platform }}
          path: dist-artifacts/*
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Publish EchoAI
  # ─────────────────────────────────────────────
  publish-echoai:
    if: inputs.echoai_version != ''
    name: Publish EchoAI
    needs: build-echoai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sh -c '
            for f; do sha256sum "$f" | sed "s|  .*/|  |" >> checksums.sha256; done
          ' _ {} +
          cat checksums.sha256

      - name: Create EchoAI release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: echoai-v${{ inputs.echoai_version }}
          name: EchoAI v${{ inputs.echoai_version }}
          body: |
            ## EchoAI v${{ inputs.echoai_version }}

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/EchoWorker/EchoAIStore/main/EchoAI/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/EchoWorker/EchoAIStore/main/EchoAI/install.ps1 | iex
            ```
          files: |
            artifacts/**/*

  # ─────────────────────────────────────────────
  # Publish EchoWork
  # ─────────────────────────────────────────────
  publish-echowork:
    if: inputs.echowork_version != ''
    name: Publish EchoWork
    needs: build-echowork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        id: manifest
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${{ inputs.echowork_version }}"
          TAG="echowork-v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/EchoWorker/EchoAIStore/releases/download/${TAG}"

          find_one() {
            local found
            found=$(find artifacts -type f -name "$1" | head -n1)
            if [ -z "$found" ]; then echo "ERROR: missing $2" >&2; find artifacts -type f >&2; exit 1; fi
            echo "$found"
          }

          WIN_BUNDLE=$(find_one '*-setup.exe' 'Windows installer')
          WIN_SIG=$(cat "$(find_one '*-setup.exe.sig' 'Windows sig')")
          MAC_TAR=$(find_one '*.app.tar.gz' 'macOS bundle')
          MAC_SIG=$(cat "$(find_one '*.app.tar.gz.sig' 'macOS sig')")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "EchoWork v${VERSION}" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "${BASE_URL}/$(basename $WIN_BUNDLE)" \
            --arg mac_sig "$MAC_SIG" \
            --arg mac_url "${BASE_URL}/$(basename $MAC_TAR)" \
            '{
              version: $version, notes: $notes, pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
              }
            }' > latest.json

          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.exe' -o -name '*.nsis.zip' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) -exec cp {} release-files/ \;
          cp latest.json release-files/
          ls -la release-files/

      - name: Create EchoWork release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: echowork-v${{ inputs.echowork_version }}
          name: EchoWork v${{ inputs.echowork_version }}
          body: |
            ## EchoWork v${{ inputs.echowork_version }}

            Requires [EchoAI](https://github.com/EchoWorker/EchoAIStore/tree/main/EchoAI) backend.
          files: release-files/*

      - name: Update echowork-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete echowork-latest --yes 2>/dev/null || true
          gh release create echowork-latest \
            --title "EchoWork Latest (v${{ inputs.echowork_version }})" \
            --notes "Auto-updater pointer release." \
            release-files/*
